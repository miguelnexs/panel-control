name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-publish-windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint --silent

      - name: Build and Publish (Windows NSIS Web)
        working-directory: frontend
        run: npm run publish:win:web

      - name: Build Web (dist-web)
        working-directory: frontend
        run: npm run build:web

      - name: Pack Web Build (zip)
        working-directory: frontend
        run: |
          if (Test-Path "dist-web.zip") { Remove-Item "dist-web.zip" -Force }
          Compress-Archive -Path "dist-web\\*" -DestinationPath "dist-web.zip" -Force

      - name: Upload Web Build to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            frontend/dist-web.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
